<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Character Showcase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #msg {
      color: #fff; font-family: sans-serif; font-size: 18px;
      background: rgba(0,0,0,0.55); padding: 16px 28px; border-radius: 12px;
      text-align: center;
    }
    #bar { width: 200px; height: 4px; background: #333; border-radius: 2px; margin-top: 12px; overflow: hidden; }
    #fill { height: 100%; width: 0%; background: #7eb8ff; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="msg">
      Loading…
      <div id="bar"><div id="fill"></div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    var fillEl = document.getElementById('fill');
    var msgEl  = document.getElementById('msg');
    var ui     = document.getElementById('ui');

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.setClearColor(0x0d0d1a, 1);
    document.body.appendChild(renderer.domElement);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    var sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(3, 5, 3);
    scene.add(sun);
    var rim = new THREE.DirectionalLight(0x8899ff, 0.8);
    rim.position.set(-3, 2, -2);
    scene.add(rim);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    var draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
    var loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(draco);

    var mixer = null;
    var clock  = new THREE.Clock();

    loader.load(
      'models/character.glb',
      function (gltf) {
        var model = gltf.scene;
        // Character faces +X in glTF; rotate so it faces +Z (toward camera)
        model.rotation.y = -Math.PI / 2;
        scene.add(model);

        // Center and frame
        var box    = new THREE.Box3().setFromObject(model);
        var center = box.getCenter(new THREE.Vector3());
        var size   = box.getSize(new THREE.Vector3());
        model.position.sub(center);

        var maxDim = Math.max(size.x, size.y, size.z);
        var fovRad = THREE.Math.degToRad(camera.fov);
        var dist   = (maxDim / 2) / Math.tan(fovRad / 2) / 0.7;
        camera.position.set(0, 0, dist);
        camera.near = dist / 100;
        camera.far  = dist * 10;
        camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0);
        controls.update();

        // Sequential loop: anim0(from 1.5s) → anim1(from 1.0s) → anim0 → …
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          var clips     = gltf.animations;
          var startTimes = [1.5, 1.0];
          var current   = 0;

          function playClip(index) {
            var clip   = clips[index % clips.length];
            var start  = startTimes[index % startTimes.length];
            var action = mixer.clipAction(clip);
            action.reset();
            action.setLoop(THREE.LoopOnce, 1);
            action.clampWhenFinished = false;
            action.play();
            action.time = Math.min(start, clip.duration - 0.01);
            current = index;
          }

          // When one clip finishes, play the next
          mixer.addEventListener('finished', function () {
            playClip(current + 1);
          });

          playClip(0);
        }

        // Flush accumulated clock time so first delta is near zero
        clock.getDelta();

        ui.style.display = 'none';
      },
      function (xhr) {
        if (xhr.total) {
          var pct = Math.round(xhr.loaded / xhr.total * 100);
          fillEl.style.width = pct + '%';
          msgEl.firstChild.nodeValue = 'Loading… ' + pct + '%';
        }
      },
      function (err) {
        msgEl.firstChild.nodeValue = 'Error: ' + (err.message || 'failed');
        console.error(err);
      }
    );

    (function animate() {
      requestAnimationFrame(animate);
      var delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
