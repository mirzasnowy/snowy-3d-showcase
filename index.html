<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Character Showcase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #msg {
      color: #fff; font-family: sans-serif; font-size: 18px;
      background: rgba(0,0,0,0.55); padding: 16px 28px; border-radius: 12px;
      text-align: center;
    }
    #bar { width: 200px; height: 4px; background: #333; border-radius: 2px; margin-top: 12px; overflow: hidden; }
    #fill { height: 100%; width: 0%; background: #7eb8ff; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="msg">
      Loading…
      <div id="bar"><div id="fill"></div></div>
    </div>
  </div>

  <!-- r128: global script build with working THREE.OrbitControls etc -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    var fillEl = document.getElementById('fill');
    var msgEl  = document.getElementById('msg');
    var ui     = document.getElementById('ui');

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.setClearColor(0x0d0d1a, 1);
    document.body.appendChild(renderer.domElement);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    var sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(3, 5, 3);
    scene.add(sun);
    var rim = new THREE.DirectionalLight(0x8899ff, 0.8);
    rim.position.set(-3, 2, -2);
    scene.add(rim);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    var draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
    var loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(draco);

    // Procedural idle state
    var model, bones = {}, baseY = 0;

    loader.load(
      'models/character.glb',
      function (gltf) {
        model = gltf.scene;
        scene.add(model);

        // Center and frame
        var box    = new THREE.Box3().setFromObject(model);
        var center = box.getCenter(new THREE.Vector3());
        var size   = box.getSize(new THREE.Vector3());
        model.position.sub(center);
        baseY = model.position.y;

        var maxDim = Math.max(size.x, size.y, size.z);
        var fovRad = THREE.Math.degToRad(camera.fov);
        var dist   = (maxDim / 2) / Math.tan(fovRad / 2) / 0.7;
        camera.position.set(0, 0, dist);
        camera.near = dist / 100;
        camera.far  = dist * 10;
        camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0);
        controls.update();

        // Collect bones by name for procedural animation
        model.traverse(function (obj) {
          if (obj.isBone) bones[obj.name] = obj;
        });

        ui.style.display = 'none';
      },
      function (xhr) {
        if (xhr.total) {
          var pct = Math.round(xhr.loaded / xhr.total * 100);
          fillEl.style.width = pct + '%';
          msgEl.firstChild.nodeValue = 'Loading… ' + pct + '%';
        }
      },
      function (err) {
        msgEl.firstChild.nodeValue = 'Error: ' + (err.message || 'failed');
        console.error(err);
      }
    );

    function idleAnimate(t) {
      if (!model) return;

      // Gentle float
      model.position.y = baseY + Math.sin(t * 0.8) * 0.015;

      // Breathing – spine expand/contract
      if (bones.Spine01) bones.Spine01.rotation.x = Math.sin(t * 1.3) * 0.025;
      if (bones.Spine02) bones.Spine02.rotation.x = Math.sin(t * 1.3 + 0.4) * 0.018;
      if (bones.Waist)   bones.Waist.rotation.x   = Math.sin(t * 1.3 - 0.2) * 0.01;

      // Head gentle sway
      if (bones.Head) {
        bones.Head.rotation.y = Math.sin(t * 0.45) * 0.06;
        bones.Head.rotation.z = Math.sin(t * 0.6)  * 0.025;
      }

      // Neck follows head slightly
      if (bones.NeckTwist01) bones.NeckTwist01.rotation.y = Math.sin(t * 0.45) * 0.03;

      // Clavicles rise with breathing
      if (bones.L_Clavicle) bones.L_Clavicle.rotation.z =  Math.sin(t * 1.3) * 0.018;
      if (bones.R_Clavicle) bones.R_Clavicle.rotation.z = -Math.sin(t * 1.3) * 0.018;

      // Arms drift subtly
      if (bones.L_Upperarm) bones.L_Upperarm.rotation.z =  Math.sin(t * 0.55 + 0.5) * 0.04;
      if (bones.R_Upperarm) bones.R_Upperarm.rotation.z = -Math.sin(t * 0.55 + 0.5) * 0.04;
      if (bones.L_Forearm)  bones.L_Forearm.rotation.z  =  Math.sin(t * 0.4) * 0.02;
      if (bones.R_Forearm)  bones.R_Forearm.rotation.z  = -Math.sin(t * 0.4) * 0.02;

      // Hip subtle sway
      if (bones.Hip) bones.Hip.rotation.z = Math.sin(t * 0.35) * 0.012;

      // Thigh tiny weight shift
      if (bones.L_Thigh) bones.L_Thigh.rotation.z =  Math.sin(t * 0.35) * 0.01;
      if (bones.R_Thigh) bones.R_Thigh.rotation.z = -Math.sin(t * 0.35) * 0.01;
    }

    var clock = new THREE.Clock();
    (function animate() {
      requestAnimationFrame(animate);
      var t = clock.getElapsedTime();
      idleAnimate(t);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
